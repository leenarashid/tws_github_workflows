name: Label Runner
on:
  push:
    branches: [main]
jobs:
  label-runner:
    runs-on: [my-linux-runner]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Print Runner-name
        run:  echo "$RUNNER_NAME"
      - name: Print Runner-labels
        run:  echo "$RUNNER_LABELS" 
      - name: Print job for runner label output
        run: | 
             echo "Print pwd"
             pwd
             echo "Hostname"
             hostname
         
