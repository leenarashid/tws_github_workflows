name: pr-check

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize]
    paths:
      - ".github/workflows/pr-check.yml"

jobs:
  branch-print:
    runs-on: ubuntu-latest
    steps:
      - name: Branch Check
        run: echo "The branch name is: ${{ github.head_ref }}"

      - name: New Branch
        run: echo "A new branch ${{ github.head_ref }} has been created"


