name: Pre-installed Version Check
on:
  push:
    branches: [main]
jobs: 
  version-check:
    runs-on: ubuntu-latest
    
    steps: 
    - name: Print the pre-installed package
      run: |
        for i in python git docker node; do
          dpkg -l | grep $i || echo "$i is not installed"
        done 
  
