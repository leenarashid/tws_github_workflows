name: Fail-Fast Test

on:
  push:
    branches:
      - main

jobs:
  matrix-job:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        os: [windows-latest, ubuntu-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Force fail for Python 3.10
        if: matrix.python-version == '3.10'
        run: exit 1

      - name: Print Python version
        run: python --version

      - name: Print OS
        run: echo ${{ matrix.os }}
